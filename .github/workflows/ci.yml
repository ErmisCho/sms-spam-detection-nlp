name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: React frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Test and build frontend
        run: npm run check

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"
          enable-cache: true

      - name: Sync locked environment
        run: uv sync --locked --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --frozen coverage run --branch -m unittest discover -s tests

      - name: Enforce API coverage
        run: uv run --frozen coverage report --include="src/sms_spam_ham_analysis/api.py,src/sms_spam_ham_analysis/predict.py" --fail-under=85

      - name: Compile package
        run: uv run --frozen python -m compileall -q src

  container:
    name: Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build locked non-root API image
        run: docker build --tag sms-spam-api:ci .

      - name: Verify runtime contract
        run: |
          test "$(docker image inspect sms-spam-api:ci --format '{{.Config.User}}')" = "appuser"
          docker image inspect sms-spam-api:ci --format '{{json .Config.Healthcheck.Test}}' | grep -q '/health/ready'

      - name: Smoke test storage-free runtime
        run: |
          container_id=$(docker run --detach --rm --publish 127.0.0.1::8000 sms-spam-api:ci)
          trap 'docker logs "$container_id"; docker stop "$container_id" >/dev/null 2>&1 || true' EXIT
          port=$(docker port "$container_id" 8000/tcp | awk -F: '{print $NF}')
          for attempt in {1..30}; do
            if curl --fail --silent "http://127.0.0.1:$port/health/ready" >/dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent "http://127.0.0.1:$port/health/ready" >/dev/null
          curl --fail --silent \
            --header 'Content-Type: application/json' \
            --data '{"text":"You have won cash prize claim now"}' \
            "http://127.0.0.1:$port/api/v1/predict" \
            | jq --exit-status '.label == "spam"' >/dev/null

  infrastructure:
    name: Azure IaC contract
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Compile Bicep without deploying
        run: |
          az bicep build --file infra/azure/main.bicep --stdout >/dev/null
          az bicep build --file infra/azure/resource-group.bicep --stdout >/dev/null
          az bicep build --file infra/azure/budget.bicep --stdout >/dev/null

      - name: Verify free-tier-oriented resource plan
        run: python -m unittest tests.test_azure_contract
