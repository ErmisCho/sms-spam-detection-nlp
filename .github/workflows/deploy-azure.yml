name: Deploy to Azure

on:
  workflow_dispatch:
    inputs:
      image_digest:
        description: Published GHCR digest (sha256:...)
        required: true
        type: string
      environment:
        description: Protected GitHub Environment containing Azure configuration
        required: true
        default: production
        type: environment

permissions:
  contents: read
  id-token: write

concurrency:
  group: azure-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy immutable image
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      GHCR_IMAGE_PATH: ermischo/sms-spam-detection-nlp
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      LOCATION: ${{ vars.AZURE_LOCATION }}
      NAME_PREFIX: ${{ vars.AZURE_NAME_PREFIX }}
      EXPIRY_DATE: ${{ vars.AZURE_EXPIRY_DATE }}
    steps:
      - name: Validate immutable digest
        id: digest
        env:
          DIGEST: ${{ inputs.image_digest }}
        run: |
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "image_digest must be a complete sha256 digest" >&2
            exit 1
          fi
          echo "hex=${DIGEST#sha256:}" >> "$GITHUB_OUTPUT"

      - name: Check out deployment definition
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Authenticate to Azure with OIDC
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Validate deployment and capture rollback image
        id: before
        run: |
          test -n "$RESOURCE_GROUP"
          test -n "$LOCATION"
          test -n "$NAME_PREFIX"
          test -n "$EXPIRY_DATE"
          az deployment group validate \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/azure/main.bicep \
            --parameters location="$LOCATION" namePrefix="$NAME_PREFIX" ghcrImagePath="$GHCR_IMAGE_PATH" imageDigest="${{ steps.digest.outputs.hex }}" expiryDate="$EXPIRY_DATE" \
            --only-show-errors
          app_name=$(az deployment group show --resource-group "$RESOURCE_GROUP" --name sms-spam-api --query properties.outputs.containerAppName.value -o tsv 2>/dev/null || true)
          previous_digest=""
          if [[ -n "$app_name" ]]; then
            previous_image=$(az containerapp show --resource-group "$RESOURCE_GROUP" --name "$app_name" --query properties.template.containers[0].image -o tsv 2>/dev/null || true)
            if [[ "$previous_image" =~ @sha256:([0-9a-f]{64})$ ]]; then
              previous_digest="${BASH_REMATCH[1]}"
            fi
          fi
          echo "app_name=$app_name" >> "$GITHUB_OUTPUT"
          echo "previous_digest=$previous_digest" >> "$GITHUB_OUTPUT"

      - name: Deploy digest
        id: deploy
        run: |
          az deployment group create \
            --name sms-spam-api \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/azure/main.bicep \
            --parameters location="$LOCATION" namePrefix="$NAME_PREFIX" ghcrImagePath="$GHCR_IMAGE_PATH" imageDigest="${{ steps.digest.outputs.hex }}" expiryDate="$EXPIRY_DATE" \
            --only-show-errors \
            --output json > deployment.json
          app_name=$(jq -r '.properties.outputs.containerAppName.value' deployment.json)
          app_url=$(jq -r '.properties.outputs.applicationUrl.value' deployment.json)
          test -n "$app_name" && test "$app_name" != null
          test -n "$app_url" && test "$app_url" != null
          echo "app_name=$app_name" >> "$GITHUB_OUTPUT"
          echo "app_url=${app_url%/}" >> "$GITHUB_OUTPUT"

      - name: Smoke test deployed revision
        id: smoke
        continue-on-error: true
        env:
          APP_URL: ${{ steps.deploy.outputs.app_url }}
        run: |
          for attempt in {1..30}; do
            live=$(curl --fail --silent --show-error "$APP_URL/health/live" || true)
            ready=$(curl --fail --silent --show-error "$APP_URL/health/ready" || true)
            home=$(curl --fail --silent --show-error "$APP_URL/" || true)
            if [[ -n "$live" && -n "$ready" && "$home" == *MessageGuard* ]]; then
              prediction=$(curl --fail --silent --show-error \
                --header 'Content-Type: application/json' \
                --data '{"text":"You have won cash prize claim now"}' \
                "$APP_URL/api/v1/predict" || true)
              if jq --exit-status '.label == "spam" and (.confidence >= 0.5)' <<<"$prediction" >/dev/null 2>&1; then
                exit 0
              fi
            fi
            sleep 10
          done
          echo "Azure smoke checks failed" >&2
          exit 1

      - name: Restore previous image after failed smoke test
        if: steps.smoke.outcome == 'failure' && steps.before.outputs.previous_digest != ''
        env:
          PREVIOUS_DIGEST: ${{ steps.before.outputs.previous_digest }}
        run: |
          az deployment group create \
            --name sms-spam-api-rollback \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/azure/main.bicep \
            --parameters location="$LOCATION" namePrefix="$NAME_PREFIX" ghcrImagePath="$GHCR_IMAGE_PATH" imageDigest="$PREVIOUS_DIGEST" expiryDate="$EXPIRY_DATE" \
            --only-show-errors

      - name: Fail deployment after rollback
        if: steps.smoke.outcome == 'failure'
        run: |
          echo "Deployment smoke test failed. The workflow restored the prior image when one existed." >&2
          exit 1

      - name: Record deployment
        if: steps.smoke.outcome == 'success'
        env:
          APP_URL: ${{ steps.deploy.outputs.app_url }}
          IMAGE_DIGEST: ${{ inputs.image_digest }}
        run: |
          {
            echo "### Azure deployment"
            echo "- Image: \`ghcr.io/$GHCR_IMAGE_PATH@$IMAGE_DIGEST\`"
            echo "- Application: $APP_URL"
            echo "- Environment: \`${{ inputs.environment }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
